services:
  master:
    build:
      context: .
      dockerfile: Dockerfile.release
      args:
        - TARGET_DIR=target/aarch64-unknown-linux-musl/release
    container_name: node-master
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - R4A_SECRET=test_secret_for_cluster_123
      - R4A_ADMIN_SECRET=test_admin_secret_456
      - RUST_LOG=info
      # dev: явный endpoint, иначе автодетект уйдёт в ipify и вернёт IP хоста
      - R4A_PUBLIC_ENDPOINT=172.20.0.10:51820
    command: sh -c "/usr/local/bin/r4a-web --port 3502 & /usr/local/bin/r4a-server init"
    restart: always
    ports:
      - "3501:3501"
      - "3502:3502"
      - "3500:3500"
      - "443:443"
      - "51820:51820/udp"
    volumes:
      - master_data:/root/.r4a-server
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    networks:
      r4a-net:
        ipv4_address: 172.20.0.10

  agent1:
    build:
      context: .
      dockerfile: Dockerfile.release
      args:
        - TARGET_DIR=target/aarch64-unknown-linux-musl/release
    container_name: node-agent1
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - R4A_SECRET=test_secret_for_cluster_123
      - RUST_LOG=info
      - R4A_SKIP_SIGNATURE_VERIFY=1
    command: r4a-agent connect --master http://master:3501 --name agent1
    restart: always
    depends_on:
      - master
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - agent1_data:/root/.r4a-agent
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    networks:
      - r4a-net

  agent2:
    build:
      context: .
      dockerfile: Dockerfile.release
      args:
        - TARGET_DIR=target/aarch64-unknown-linux-musl/release
    container_name: node-agent2
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - R4A_SECRET=test_secret_for_cluster_123
      - RUST_LOG=info
      - R4A_SKIP_SIGNATURE_VERIFY=1
    command: r4a-agent connect --master http://master:3501 --name agent2
    restart: always
    depends_on:
      - master
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - agent2_data:/root/.r4a-agent
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    networks:
      - r4a-net

volumes:
  master_data:
  agent1_data:
  agent2_data:

networks:
  r4a-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
